
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="BamBam Ponto">
<meta name="theme-color" content="#DB2777">
<title>BAMBAM BABY – Ponto</title>
<link rel="apple-touch-icon" href="icon.png">
<link rel="icon" type="image/png" href="icon.png">
<link rel="manifest" href="manifest.json">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;900&family=Baloo+2:wght@700;800&display=swap');
:root {
  --rosa:#FF6B9D; --roxo:#C678DD; --azul:#61AFEF; --verde:#98C379;
  --amarelo:#E5C07B; --bg:#1a1a2e; --card:#16213e; --card2:#0f3460;
  --text:#f0f0f0; --sub:#a0aec0; --radius:18px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;align-items:center;}
header{width:100%;background:linear-gradient(135deg,#C678DD,#FF6B9D);padding:18px 24px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 4px 20px #FF6B9D55;}
header h1{font-family:'Baloo 2',cursive;font-size:1.5rem;color:#fff;text-shadow:0 2px 8px #0005;}
.badge{background:#fff3;border:1.5px solid #fff6;border-radius:30px;padding:4px 14px;font-size:.78rem;font-weight:700;color:#fff;}
#app{width:92%;max-width:480px;margin:24px auto 80px;display:flex;flex-direction:column;gap:18px;}
.card{background:var(--card);border-radius:var(--radius);padding:20px;box-shadow:0 4px 24px #0004;border:1px solid #ffffff0f;}
.card h2{font-family:'Baloo 2',cursive;font-size:1.05rem;color:var(--rosa);margin-bottom:12px;display:flex;align-items:center;gap:8px;}
#clock{text-align:center;font-size:2.2rem;font-weight:900;font-family:'Baloo 2',cursive;color:var(--azul);letter-spacing:2px;}
#date-str{text-align:center;font-size:.82rem;color:var(--sub);margin-top:2px;}
#reader{border-radius:12px;overflow:hidden;background:#000;min-height:220px;}
#reader video{border-radius:12px;}
#log-list{list-style:none;display:flex;flex-direction:column;gap:7px;max-height:200px;overflow-y:auto;}
#log-list li{background:var(--card2);border-radius:10px;padding:9px 13px;font-size:.8rem;display:flex;justify-content:space-between;align-items:center;gap:8px;}
#log-list li .log-name{font-weight:700;flex:1;}
#log-list li .log-action{color:var(--sub);font-size:.75rem;}
#log-list li .log-time{color:var(--amarelo);font-weight:700;white-space:nowrap;}
#admin-btn{position:fixed;bottom:20px;right:20px;background:var(--card2);border:1.5px solid var(--roxo);border-radius:50px;padding:10px 18px;color:var(--roxo);font-weight:700;font-size:.82rem;cursor:pointer;box-shadow:0 4px 16px #0006;transition:background .2s;}
#admin-btn:hover{background:var(--roxo);color:#fff;}
.modal-overlay{display:none;position:fixed;inset:0;background:#000a;z-index:200;align-items:center;justify-content:center;padding:20px;}
.modal-overlay.open{display:flex;}
.modal{background:var(--card);border:1.5px solid #ffffff15;border-radius:22px;padding:26px;width:100%;max-width:360px;box-shadow:0 20px 60px #0008;animation:popIn .25s ease;text-align:center;}
@keyframes popIn{from{transform:scale(.88);opacity:0}to{transform:scale(1);opacity:1}}
.emp-avatar{width:64px;height:64px;border-radius:50%;background:linear-gradient(135deg,#C678DD,#FF6B9D);margin:0 auto 12px;display:flex;align-items:center;justify-content:center;font-size:1.4rem;font-weight:900;color:#fff;}
.emp-nome{font-size:1rem;font-weight:900;margin-bottom:3px;}
.emp-cargo{font-size:.75rem;color:var(--sub);margin-bottom:16px;}
.ultimo-box{border-radius:11px;padding:11px 14px;margin-bottom:18px;font-size:.82rem;font-weight:600;line-height:1.7;}
.ultimo-entrada{background:#98C37922;border:1.5px solid var(--verde);color:var(--verde);}
.ultimo-saida{background:#E5C07B22;border:1.5px solid var(--amarelo);color:var(--amarelo);}
.ultimo-nenhum{background:#ffffff0a;border:1.5px solid #ffffff15;color:var(--sub);}
.ultimo-box strong{font-size:.92rem;display:block;margin-top:3px;}
.pergunta{font-size:.9rem;font-weight:700;margin-bottom:14px;}
.escolha-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px;}
.btn-escolha{padding:16px 10px;border-radius:13px;border:2px solid transparent;font-family:'Nunito',sans-serif;font-size:.88rem;font-weight:800;cursor:pointer;transition:.15s;text-align:center;line-height:1.5;}
.btn-escolha:hover{transform:translateY(-2px);}
.btn-escolha .ic{font-size:1.7rem;display:block;margin-bottom:5px;}
.btn-e{background:#98C37922;border-color:var(--verde);color:var(--verde);}
.btn-e:hover{background:#98C37944;}
.btn-s{background:#FF6B9D22;border-color:var(--rosa);color:var(--rosa);}
.btn-s:hover{background:#FF6B9D44;}
.confirma-box{border-radius:11px;padding:14px;margin-bottom:16px;font-size:.88rem;font-weight:700;line-height:1.7;}
.confirma-entrada{background:#98C37922;border:2px solid var(--verde);color:var(--verde);}
.confirma-saida{background:#FF6B9D22;border:2px solid var(--rosa);color:var(--rosa);}
.btn{display:block;width:100%;padding:13px;border:none;border-radius:12px;font-family:'Nunito',sans-serif;font-size:.95rem;font-weight:800;cursor:pointer;transition:.15s;margin-bottom:9px;}
.btn:active{transform:scale(.97);}
.btn-verde-solid{background:linear-gradient(90deg,#56d275,#98C379);color:#fff;}
.btn-rosa-solid{background:linear-gradient(90deg,#FF6B9D,#C678DD);color:#fff;}
.btn-cancelar{background:#ffffff0f;color:var(--sub);border:1.5px solid #ffffff15;}
.btn-voltar{background:#ffffff0f;color:var(--sub);font-size:.8rem;padding:9px;margin-bottom:0;}
::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-thumb{background:#ffffff22;border-radius:99px;}
</style>
</head>
<body>

<header>
  <h1>🍼 BAMBAM BABY</h1>
  <span class="badge" id="wifi-badge">Conectando…</span>
</header>

<div id="app">
  <div class="card">
    <div id="clock">--:--:--</div>
    <div id="date-str">carregando...</div>
  </div>
  <div class="card">
    <h2>📷 Escanear Crachá</h2>
    <div id="reader"></div>
  </div>
  <div class="card">
    <h2>📋 Registros de hoje</h2>
    <ul id="log-list"><li style="color:var(--sub);font-size:.85rem;padding:8px">Nenhum registro ainda.</li></ul>
  </div>
</div>

<button id="admin-btn" onclick="location.href='admin.html'">⚙️ Admin</button>

<div class="modal-overlay" id="modal">
  <div class="modal">
    <div id="step1">
      <div class="emp-avatar" id="av1"></div>
      <div class="emp-nome"   id="nm1">—</div>
      <div class="emp-cargo"  id="cg1">—</div>
      <div class="ultimo-box" id="ultimo-box">🔍 Buscando…</div>
      <div class="pergunta">O que deseja registrar agora?</div>
      <div class="escolha-grid">
        <button class="btn-escolha btn-e" onclick="escolher('entrada')"><span class="ic">✅</span>ENTRADA</button>
        <button class="btn-escolha btn-s" onclick="escolher('saida')"><span class="ic">🚪</span>SAÍDA</button>
      </div>
      <button class="btn btn-cancelar" onclick="fecharModal()">Cancelar</button>
    </div>
    <div id="step2" style="display:none">
      <div class="emp-avatar" id="av2"></div>
      <div class="emp-nome"   id="nm2">—</div>
      <div class="emp-cargo"  id="cg2">—</div>
      <div class="confirma-box" id="confirma-box"></div>
      <button class="btn" id="btn-confirmar" onclick="confirmarPonto()">Confirmar</button>
      <button class="btn btn-voltar" onclick="voltarStep1()">← Voltar e escolher de novo</button>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, onValue, push, set, get } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyDQ6EUH_HBLYd76HMCdlgupNcwzTHvgido",
  authDomain: "bambam-ponto.firebaseapp.com",
  databaseURL: "https://bambam-ponto-default-rtdb.firebaseio.com",
  projectId: "bambam-ponto",
  storageBucket: "bambam-ponto.firebasestorage.app",
  messagingSenderId: "30916647304",
  appId: "1:30916647304:web:70323b427dbdd0e51d423d"
};
const app = initializeApp(firebaseConfig);
const db  = getDatabase(app);

const PADRAO = [
  {id:'EMP001',nome:'ADILSON DO CARMO MACHADO',cargo:'Colaborador'},
  {id:'EMP002',nome:'ANA LUIZA SECO SILVA DE OLIVEIRA',cargo:'Colaboradora'},
  {id:'EMP003',nome:'ANA PAULA ZULATO PEREIRA',cargo:'Colaboradora'},
  {id:'EMP004',nome:'BEUTIMAR ANA HELENA DA SILVA',cargo:'Colaboradora'},
  {id:'EMP005',nome:'ERIKA CRISTINA DA SILVA',cargo:'Colaboradora'},
  {id:'EMP006',nome:'FABIANA ANICETO FERREIRA',cargo:'Colaboradora'},
  {id:'EMP007',nome:'JOSILANE LEANDRO VENTURA',cargo:'Colaboradora'},
  {id:'EMP008',nome:'SERGIO SOARES RAMOS',cargo:'Colaborador'},
  {id:'EMP009',nome:'SILVANA APARECIDA DA SILVA MEDEIROS',cargo:'Colaboradora'},
  {id:'EMP010',nome:'THAYLLON SALAZAR RAMOS BERNARDINO',cargo:'Colaborador'},
  {id:'EMP011',nome:'PABLO ANDERSON MODESTO JUVENAL',cargo:'Colaborador'},
];

let funcionarios={}, logHoje=[], funcSel=null, tipoEsc=null, bloqueado=false;
function dataHoje(){return new Date().toISOString().split('T')[0];}
function iniciais(n){const p=n.trim().split(' ');return(p[0][0]+(p[1]?.[0]||'')).toUpperCase();}

function tick(){
  const now=new Date();
  document.getElementById('clock').textContent=now.toLocaleTimeString('pt-BR');
  document.getElementById('date-str').textContent=now.toLocaleDateString('pt-BR',{weekday:'long',year:'numeric',month:'long',day:'numeric'});
}
tick(); setInterval(tick,1000);

document.getElementById('wifi-badge').textContent='✅ Online';

onValue(ref(db,'funcionarios'),snap=>{
  const d=snap.val(); funcionarios={};
  if(d){Object.values(d).forEach(f=>{funcionarios[f.id]=f;});}
  else{PADRAO.forEach(f=>{funcionarios[f.id]=f;set(ref(db,'funcionarios/'+f.id),f);});}
});

onValue(ref(db,'registros/'+dataHoje()),snap=>{
  logHoje=[]; const d=snap.val();
  if(d) logHoje=Object.values(d);
  renderLog();
});

function renderLog(){
  const list=document.getElementById('log-list');
  if(!logHoje.length){list.innerHTML='<li style="color:var(--sub);font-size:.85rem;padding:8px">Nenhum registro ainda.</li>';return;}
  list.innerHTML=[...logHoje].reverse().slice(0,30).map(r=>`
    <li>
      <span class="log-name">${r.nome.split(' ')[0]}</span>
      <span class="log-action">${r.tipo==='entrada'?'🟢 Entrada':'🔴 Saída'}</span>
      <span class="log-time">${r.hora}</span>
    </li>`).join('');
}

let scannerAtivo=false;
function iniciarScanner(){
  if(scannerAtivo) return; scannerAtivo=true;
  const qr=new Html5Qrcode("reader");
  qr.start({facingMode:"environment"},{fps:10,qrbox:{width:210,height:210}},
    txt=>{if(!bloqueado){bloqueado=true;abrirModal(txt);setTimeout(()=>{bloqueado=false;},5000);}},
    ()=>{}
  ).catch(()=>{
    document.getElementById('reader').innerHTML='<p style="color:var(--sub);padding:20px;text-align:center;font-size:.85rem">📵 Câmera não disponível.<br>Certifique-se de usar HTTPS.</p>';
  });
}
iniciarScanner();

async function buscarUltimo(empId){
  const hoje=new Date();
  for(let i=0;i<7;i++){
    const d=new Date(hoje); d.setDate(hoje.getDate()-i);
    const ds=d.toISOString().split('T')[0];
    const snap=await get(ref(db,'registros/'+ds));
    const val=snap.val();
    if(val){const regs=Object.values(val).filter(r=>r.empId===empId);if(regs.length)return regs[regs.length-1];}
  }
  return null;
}

window.abrirModal=async function(empId){
  const f=funcionarios[empId];
  if(!f){mostrarToast('❌ Crachá não reconhecido no sistema.','#ff4d6d');return;}
  funcSel=f; tipoEsc=null;
  document.getElementById('av1').textContent=iniciais(f.nome);
  document.getElementById('nm1').textContent=f.nome;
  document.getElementById('cg1').textContent='🪪 '+f.id+' · '+(f.cargo||'Colaborador');
  document.getElementById('step1').style.display='block';
  document.getElementById('step2').style.display='none';
  document.getElementById('modal').classList.add('open');
  const box=document.getElementById('ultimo-box');
  box.className='ultimo-box ultimo-nenhum'; box.innerHTML='🔍 Buscando último registro…';
  const ultimo=await buscarUltimo(f.id);
  if(!ultimo){box.className='ultimo-box ultimo-nenhum';box.innerHTML='📋 Nenhum registro anterior encontrado.';}
  else{
    const ehHoje=ultimo.data===dataHoje();
    const quando=ehHoje?'hoje':'em '+ultimo.data.split('-').reverse().join('/');
    if(ultimo.tipo==='entrada'){box.className='ultimo-box ultimo-entrada';box.innerHTML=`Último registro:<strong>✅ ENTRADA ${quando} às ${ultimo.hora}</strong>`;}
    else{box.className='ultimo-box ultimo-saida';box.innerHTML=`Último registro:<strong>🚪 SAÍDA ${quando} às ${ultimo.hora}</strong>`;}
  }
}

window.escolher=function(tipo){
  tipoEsc=tipo; const f=funcSel, agora=new Date().toLocaleTimeString('pt-BR');
  document.getElementById('av2').textContent=iniciais(f.nome);
  document.getElementById('nm2').textContent=f.nome;
  document.getElementById('cg2').textContent='🪪 '+f.id+' · '+(f.cargo||'Colaborador');
  const box=document.getElementById('confirma-box'),btn=document.getElementById('btn-confirmar');
  if(tipo==='entrada'){box.className='confirma-box confirma-entrada';box.innerHTML=`Você está registrando:<br><strong>✅ ENTRADA às ${agora}</strong>`;btn.className='btn btn-verde-solid';btn.innerHTML='✅ Confirmar ENTRADA';}
  else{box.className='confirma-box confirma-saida';box.innerHTML=`Você está registrando:<br><strong>🚪 SAÍDA às ${agora}</strong>`;btn.className='btn btn-rosa-solid';btn.innerHTML='🚪 Confirmar SAÍDA';}
  document.getElementById('step1').style.display='none';
  document.getElementById('step2').style.display='block';
}

window.voltarStep1=function(){tipoEsc=null;document.getElementById('step1').style.display='block';document.getElementById('step2').style.display='none';}

window.confirmarPonto=async function(){
  if(!funcSel||!tipoEsc) return;
  const f=funcSel,agora=new Date();
  const reg={empId:f.id,nome:f.nome,cargo:f.cargo||'Colaborador',tipo:tipoEsc,data:dataHoje(),hora:agora.toLocaleTimeString('pt-BR'),timestamp:agora.toISOString()};
  try{
    await push(ref(db,'registros/'+dataHoje()),reg);
    if(navigator.vibrate) navigator.vibrate([80,40,80]);
    fecharModal();
    mostrarToast(tipoEsc==='entrada'?`✅ Boa chegada, ${f.nome.split(' ')[0]}!`:`👋 Até logo, ${f.nome.split(' ')[0]}!`,tipoEsc==='entrada'?'#98C379':'#FF6B9D');
  }catch(e){alert('❌ Erro ao registrar. Verifique a conexão.');}
}

window.fecharModal=function(){document.getElementById('modal').classList.remove('open');funcSel=null;tipoEsc=null;}
document.getElementById('modal').addEventListener('click',function(e){if(e.target===this)fecharModal();});

function mostrarToast(msg,cor){
  let t=document.getElementById('toast');
  if(!t){t=document.createElement('div');t.id='toast';Object.assign(t.style,{position:'fixed',bottom:'80px',left:'50%',transform:'translateX(-50%) translateY(80px)',color:'#fff',padding:'13px 26px',borderRadius:'30px',fontFamily:'Nunito,sans-serif',fontWeight:'800',fontSize:'.92rem',boxShadow:'0 8px 24px #0006',transition:'transform .3s',zIndex:'999',whiteSpace:'nowrap',maxWidth:'90vw',textAlign:'center'});document.body.appendChild(t);}
  t.textContent=msg; t.style.background=cor||'#1F2937';
  setTimeout(()=>{t.style.transform='translateX(-50%) translateY(0)';},10);
  setTimeout(()=>{t.style.transform='translateX(-50%) translateY(80px)';},4000);
}
</script>
</body>
</html>
